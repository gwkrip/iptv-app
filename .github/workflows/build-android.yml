name: 🚀 Build Android APK & AAB

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - appbundle
          - both

jobs:
  build:
    name: 🏗️ Build Android
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Java ────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── Flutter ─────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Flutter version info
        run: flutter --version

      # ─── Dependencies ────────────────────────────────────────
      - name: 📚 Install dependencies
        run: flutter pub get

      # ─── Code Quality ─────────────────────────────────────────
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ─── Tests ────────────────────────────────────────────────
      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      # ─── Keystore (Release Signing) ───────────────────────────
      - name: 🔑 Decode Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
            if [ -s android/app/release.keystore ]; then
              echo "has_keystore=true" >> $GITHUB_OUTPUT
              echo "✅ Keystore decoded successfully"
            else
              rm -f android/app/release.keystore
              echo "has_keystore=false" >> $GITHUB_OUTPUT
              echo "⚠️ Keystore file empty, using debug signing"
            fi
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "⚠️ KEYSTORE_BASE64 not set, using debug signing"
          fi

      - name: 📝 Create key.properties
        if: steps.keystore.outputs.has_keystore == 'true'
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF
          echo "✅ key.properties created"

      # ─── Get Version ──────────────────────────────────────────
      - name: 🏷️ Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 App version: $VERSION"

      # ─── Build APK (Debug) — PR only ─────────────────────────
      - name: 🔨 Build APK (Debug)
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk --debug \
            --build-name=$(echo "${{ steps.version.outputs.version }}" | cut -d'+' -f1) \
            --build-number=${{ github.run_number }}

      # ─── Build APK (Release) ─────────────────────────────────
      - name: 🔨 Build APK (Release)
        if: |
          github.event_name != 'pull_request' &&
          (github.event.inputs.build_type == 'apk' ||
           github.event.inputs.build_type == 'both' ||
           github.event.inputs.build_type == '' ||
           startsWith(github.ref, 'refs/tags/'))
        run: |
          flutter build apk --release \
            --build-name=$(echo "${{ steps.version.outputs.version }}" | cut -d'+' -f1) \
            --build-number=${{ github.run_number }} \
            --split-per-abi

      # ─── Build AAB ────────────────────────────────────────────
      - name: 📦 Build App Bundle (AAB)
        if: |
          github.event_name != 'pull_request' &&
          (github.event.inputs.build_type == 'appbundle' ||
           github.event.inputs.build_type == 'both' ||
           startsWith(github.ref, 'refs/tags/'))
        run: |
          flutter build appbundle --release \
            --build-name=$(echo "${{ steps.version.outputs.version }}" | cut -d'+' -f1) \
            --build-number=${{ github.run_number }}

      # ─── Collect Artifacts ───────────────────────────────────
      - name: 🗂️ Collect build artifacts
        if: always()
        run: |
          mkdir -p output/apk output/aab
          TAG="${{ steps.version.outputs.version }}-build${{ github.run_number }}"

          APK_DIR="build/app/outputs/flutter-apk"
          if ls "$APK_DIR"/*.apk 1>/dev/null 2>&1; then
            for f in "$APK_DIR"/*.apk; do
              base=$(basename "$f" .apk)
              cp "$f" "output/apk/MyIPTV-${TAG}-${base}.apk"
              echo "✅ $base"
            done
          else
            echo "ℹ️ No APK files"
          fi

          AAB="build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB" ]; then
            cp "$AAB" "output/aab/MyIPTV-${TAG}.aab"
            echo "✅ AAB copied"
          else
            echo "ℹ️ No AAB file"
          fi

          echo "── Output ──"
          find output -type f || echo "(none)"

      # ─── Upload APK Artifact ─────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MyIPTV-APK-v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          path: output/apk/
          retention-days: 30
          if-no-files-found: ignore

      # ─── Upload AAB Artifact ─────────────────────────────────
      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MyIPTV-AAB-v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          path: output/aab/
          retention-days: 30
          if-no-files-found: ignore

      # ─── GitHub Release (on tag) ─────────────────────────────
      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MyIPTV ${{ github.ref_name }}
          body: |
            ## 📱 MyIPTV ${{ github.ref_name }}

            ### 📦 Pilih APK sesuai perangkat
            | File | Keterangan |
            |------|-----------|
            | `*-arm64-v8a.apk` | HP modern 64-bit — **Direkomendasikan** |
            | `*-armeabi-v7a.apk` | HP lama 32-bit |
            | `*-x86_64.apk` | Emulator Android |
            | `*.aab` | Upload ke Google Play Store |

            ### 🚀 Cara Install APK
            1. Download APK sesuai HP kamu
            2. Aktifkan **"Install dari sumber tidak dikenal"** di Pengaturan
            3. Install & nikmati! 🎬

            ---
            🔢 **Build:** #${{ github.run_number }} | 💾 **Commit:** `${{ github.sha }}`
          files: |
            output/apk/*.apk
            output/aab/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Build Summary ───────────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          {
            echo "## 🚀 Build Summary"
            echo ""
            echo "| Info | Value |"
            echo "|------|-------|"
            echo "| 📱 App | MyIPTV |"
            echo "| 🏷️ Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| 🔢 Build Number | ${{ github.run_number }} |"
            echo "| 🌿 Branch/Tag | \`${{ github.ref_name }}\` |"
            echo "| 🔑 Signed | ${{ steps.keystore.outputs.has_keystore == 'true' && '✅ Yes (release key)' || '⚠️ No (debug key)' }} |"
            echo "| 💾 Commit | \`${{ github.sha }}\` |"
            echo ""
            if find output/apk -name "*.apk" 2>/dev/null | grep -q .; then
              echo "### 📦 APK Files"
              find output/apk -name "*.apk" -exec basename {} \; | while read f; do
                echo "- \`$f\`"
              done
            fi
            if find output/aab -name "*.aab" 2>/dev/null | grep -q .; then
              echo "### 📦 AAB Files"
              find output/aab -name "*.aab" -exec basename {} \; | while read f; do
                echo "- \`$f\`"
              done
            fi
          } >> $GITHUB_STEP_SUMMARY
