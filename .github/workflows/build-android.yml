name: 🚀 Build Android APK & AAB

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - appbundle
          - both

jobs:
  build:
    name: 🏗️ Build Android
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ───────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Java ────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── Flutter ─────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get Flutter version
        run: flutter --version

      # ─── Dependencies ────────────────────────────────────────
      - name: 📚 Install dependencies
        run: flutter pub get

      # ─── Code Quality ─────────────────────────────────────────
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ─── Tests ────────────────────────────────────────────────
      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      # ─── Keystore (Release Signing) ───────────────────────────
      - name: 🔑 Decode Keystore
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        continue-on-error: true

      - name: 📝 Create key.properties
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          if [ -f "android/app/release.keystore" ]; then
            cat > android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF
            echo "✅ key.properties created for signed build"
          else
            echo "⚠️ No keystore found, building unsigned APK"
          fi
        continue-on-error: true

      # ─── Get Version ──────────────────────────────────────────
      - name: 🏷️ Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 App version: $VERSION"

      # ─── Build APK ────────────────────────────────────────────
      - name: 🔨 Build APK (Debug)
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk --debug \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: 🔨 Build APK (Release)
        if: github.event_name != 'pull_request' && (github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == '')
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --split-per-abi
        
      # ─── Build AAB ────────────────────────────────────────────
      - name: 📦 Build App Bundle (AAB)
        if: github.event_name != 'pull_request' && (github.event.inputs.build_type == 'appbundle' || github.event.inputs.build_type == 'both' || startsWith(github.ref, 'refs/tags/'))
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ github.run_number }}

      # ─── Rename Artifacts ─────────────────────────────────────
      - name: 🗂️ Rename APK files
        run: |
          mkdir -p output/apk output/aab
          
          # Copy APKs if they exist
          if ls build/app/outputs/flutter-apk/*.apk 1> /dev/null 2>&1; then
            for file in build/app/outputs/flutter-apk/*.apk; do
              filename=$(basename "$file" .apk)
              cp "$file" "output/apk/MyIPTV-v${{ steps.version.outputs.version }}-build${{ github.run_number }}-${filename}.apk"
            done
            echo "✅ APK files copied"
          fi
          
          # Copy AAB if it exists
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            cp build/app/outputs/bundle/release/app-release.aab \
              "output/aab/MyIPTV-v${{ steps.version.outputs.version }}-build${{ github.run_number }}.aab"
            echo "✅ AAB file copied"
          fi

          echo "📂 Output files:"
          find output -type f

      # ─── Upload APK Artifact ─────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MyIPTV-APK-v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          path: output/apk/*.apk
          retention-days: 30
          if-no-files-found: ignore

      # ─── Upload AAB Artifact ─────────────────────────────────
      - name: 📤 Upload AAB Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MyIPTV-AAB-v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          path: output/aab/*.aab
          retention-days: 30
          if-no-files-found: ignore

      # ─── GitHub Release (on tag push) ────────────────────────
      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MyIPTV ${{ github.ref_name }}
          body: |
            ## 📱 MyIPTV ${{ github.ref_name }}
            
            ### 📦 Download
            | File | Keterangan |
            |------|-----------|
            | `*-arm64-v8a.apk` | Untuk HP modern (64-bit) — **Direkomendasikan** |
            | `*-armeabi-v7a.apk` | Untuk HP lama (32-bit) |
            | `*-x86_64.apk` | Untuk emulator |
            | `*.aab` | Untuk upload ke Google Play Store |
            
            ### ✨ Cara Install APK
            1. Download APK sesuai arsitektur HP kamu
            2. Aktifkan **"Install dari sumber tidak dikenal"** di Pengaturan
            3. Install APK
            4. Enjoy! 🎬
            
            ---
            **Build Number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
          files: |
            output/apk/*.apk
            output/aab/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Summary ─────────────────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 App | MyIPTV |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if find output -name "*.apk" | grep -q .; then
            echo "### 📦 APK Files" >> $GITHUB_STEP_SUMMARY
            find output -name "*.apk" -exec basename {} \; | while read f; do
              echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          if find output -name "*.aab" | grep -q .; then
            echo "### 📦 AAB Files" >> $GITHUB_STEP_SUMMARY
            find output -name "*.aab" -exec basename {} \; | while read f; do
              echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
