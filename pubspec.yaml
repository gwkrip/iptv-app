name: iptv_player
description: A beautiful IPTV Player App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.3
  chewie: ^1.7.5
  cached_network_image: ^3.3.1
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
